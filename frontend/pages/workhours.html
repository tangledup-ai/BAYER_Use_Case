<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工时数据 - 昆明拜耳制药排班系统</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
        <!-- 头部导航 -->
        <header class="header">
            <div class="header-top">
                <img src="../images/logo.jpg" alt="Bayer Logo" class="logo-img">
                <h1>昆明拜耳制药排班系统 - 数据分析平台</h1>
            </div>
            <nav class="nav-menu" id="navMenu">
                <!-- 导航将由JS动态生成 -->
            </nav>
        </header>

        <!-- 主内容区域 -->
        <main class="main-content">
            <h2 class="page-title">工时数据</h2>

            <!-- 筛选和搜索区域 -->
            <div class="filter-section">
                <input type="text" class="search-input" placeholder="🔍 搜索员工姓名或ID..." id="searchInput" onkeyup="filterTable()">
                <select class="filter-select" id="hoursSort" onchange="filterTable()">
                    <option value="">默认排序</option>
                    <option value="desc">工时从高到低</option>
                    <option value="asc">工时从低到高</option>
                </select>
                <select class="filter-select" id="monthFilter" onchange="filterTable()">
                    <option value="">全部月份</option>
                    <option value="2026-04">2026年4月</option>
                    <option value="2026-03">2026年3月</option>
                    <option value="2026-02">2026年2月</option>
                </select>
            </div>

            <!-- 工时统计卡片 -->
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>本月总工时</h3>
                    <div class="stat-value" id="totalHours">-</div>
                    <div class="stat-label">小时</div>
                </div>
                <div class="stat-card">
                    <h3>平均工时</h3>
                    <div class="stat-value" id="avgHours">-</div>
                    <div class="stat-label">小时/人</div>
                </div>
                <div class="stat-card">
                    <h3>最高工时</h3>
                    <div class="stat-value" id="maxHours">-</div>
                    <div class="stat-label">小时</div>
                </div>
                <div class="stat-card">
                    <h3>最低工时</h3>
                    <div class="stat-value" id="minHours">-</div>
                    <div class="stat-label">小时</div>
                </div>
            </div>

            <!-- 工时数据表格 -->
            <table class="data-table" id="workHoursTable">
                <thead>
                    <tr>
                        <th onclick="sortTable(0)" class="tooltip" data-tooltip="点击排序">姓名 ↕</th>
                        <th onclick="sortTable(1)" class="tooltip" data-tooltip="点击排序">员工ID ↕</th>
                        <th onclick="sortTable(2)" class="tooltip" data-tooltip="点击排序">已有工时 ↕</th>
                        <th>工时占比</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="workHoursTableBody">
                    <tr>
                        <td colspan="5" class="loading">
                            <div class="spinner"></div>
                            加载中...
                        </td>
                    </tr>
                </tbody>
            </table>

            <!-- 分页控制 -->
            <div class="pagination" id="pagination"></div>
        </main>
    </div>

    <script src="../js/main.js"></script>
    <script>
        /**
         * 工时数据管理脚本
         * 处理工时数据的显示、筛选、排序和统计功能
         */

        let workHoursData = [];
        let currentPage = 1;
        const itemsPerPage = 10;

        /**
         * 页面加载完成后初始化工时数据
         */
        document.addEventListener('DOMContentLoaded', function() {
            AuthManager.updateHeader();
            initNav();
            loadWorkHoursData();
        });

        /**
         * 根据用户角色初始化导航菜单
         */
        function initNav() {
            const user = StorageManager.get('user');
            const navMenu = document.getElementById('navMenu');
            if (!user) return;
            
            if (user.role === 'admin') {
                navMenu.innerHTML = `
                    <a href="../index.html" class="nav-item">📊 数据总览</a>
                    <a href="shifts.html" class="nav-item">🗂️ 排班数据</a>
                    <a href="workhours.html" class="nav-item active">⏰ 工时数据</a>
                    <a href="leaves.html" class="nav-item">📋 请假表</a>
                    <a href="positions.html" class="nav-item">💼 岗位工作</a>
                `;
            } else {
                navMenu.innerHTML = `
                    <a href="../index.html" class="nav-item">🗂️ 排班信息</a>
                    <a href="../index.html?tab=leaves" class="nav-item">📋 请假申请</a>
                `;
            }
        }

        /**
         * 从后端API加载工时数据
         */
        function loadWorkHoursData() {
            const user = AuthManager.checkAuth();
            if (!user) return;
            
            let url = '/api/workhours';
            if (user.role === 'employee') {
                url += `?search=${encodeURIComponent(user.name)}`;
            }

            // 模拟从后端API获取数据
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    workHoursData = data;
                    updateStats();
                    renderTable();
                })
                .catch(error => {
                    console.error('加载工时数据失败:', error);
                    // 使用示例数据
                    loadSampleWorkHoursData(user);
                });
        }

        /**
         * 加载示例工时数据用于演示
         */
        function loadSampleWorkHoursData(user) {
            workHoursData = [
                { name: '赵六', id: 'EMP001', hours: 168, month: '2026-04' },
                { name: '孙七', id: 'EMP002', hours: 160, month: '2026-04' },
                { name: '周八', id: 'EMP003', hours: 152, month: '2026-04' },
                { name: '吴九', id: 'EMP004', hours: 144, month: '2026-04' },
                { name: '郑十', id: 'EMP005', hours: 136, month: '2026-04' },
                { name: '钱一', id: 'EMP006', hours: 128, month: '2026-04' },
                { name: '孙二', id: 'EMP007', hours: 120, month: '2026-04' },
                { name: '李三', id: 'EMP008', hours: 176, month: '2026-04' },
                { name: '周四', id: 'EMP009', hours: 164, month: '2026-04' },
                { name: '吴五', id: 'EMP010', hours: 148, month: '2026-04' },
                { name: '郑六', id: 'EMP011', hours: 156, month: '2026-04' },
                { name: '王七', id: 'EMP012', hours: 140, month: '2026-04' },
                { name: '赵八', id: 'EMP013', hours: 132, month: '2026-04' },
                { name: '孙九', id: 'EMP014', hours: 124, month: '2026-04' },
                { name: '周十', id: 'EMP015', hours: 168, month: '2026-03' },
                { name: '吴一', id: 'EMP016', hours: 160, month: '2026-03' },
                { name: '郑二', id: 'EMP017', hours: 152, month: '2026-03' },
                { name: '王三', id: 'EMP018', hours: 144, month: '2026-02' }
            ];
            
            if (user && user.role === 'employee') {
                workHoursData = workHoursData.filter(i => i.name === user.name);
            }
            
            updateStats();
            renderTable();
        }

        /**
         * 更新工时统计数据
         */
        function updateStats() {
            const filteredData = getFilteredData();
            const totalHours = filteredData.reduce((sum, item) => sum + item.hours, 0);
            const avgHours = filteredData.length > 0 ? (totalHours / filteredData.length).toFixed(1) : 0;
            const maxHours = filteredData.length > 0 ? Math.max(...filteredData.map(item => item.hours)) : 0;
            const minHours = filteredData.length > 0 ? Math.min(...filteredData.map(item => item.hours)) : 0;

            document.getElementById('totalHours').textContent = totalHours;
            document.getElementById('avgHours').textContent = avgHours;
            document.getElementById('maxHours').textContent = maxHours;
            document.getElementById('minHours').textContent = minHours;
        }

        /**
         * 渲染工时表格
         */
        function renderTable() {
            const filteredData = getFilteredData();
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const pageData = filteredData.slice(startIndex, endIndex);
            const maxHours = filteredData.length > 0 ? Math.max(...filteredData.map(item => item.hours)) : 1;

            const tbody = document.getElementById('workHoursTableBody');

            if (pageData.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" style="text-align: center; padding: 40px; color: #999;">
                            暂无数据
                        </td>
                    </tr>
                `;
            } else {
                tbody.innerHTML = pageData.map((item, index) => {
                    const percentage = ((item.hours / maxHours) * 100).toFixed(1);
                    return `
                        <tr>
                            <td class="cell-name">${item.name}</td>
                            <td class="cell-id">${item.id}</td>
                            <td><span class="cell-percentage">${item.hours}小时</span></td>
                            <td>
                                <div style="display: flex; align-items: center; gap: 10px;">
                                    <div class="progress-bar" style="flex: 1;">
                                        <div class="progress-bar-fill" style="width: ${percentage}%;"></div>
                                    </div>
                                    <span style="min-width: 50px; font-size: 12px; color: #666;">${percentage}%</span>
                                </div>
                            </td>
                            <td>
                                <button class="btn btn-secondary" style="padding: 6px 12px; font-size: 12px;"
                                        onclick="viewWorkHourDetail(${startIndex + index})">
                                    详情
                                </button>
                            </td>
                        </tr>
                    `;
                }).join('');
            }

            renderPagination(filteredData.length);
        }

        /**
         * 获取筛选后的数据
         * @returns {Array} 筛选后的数据
         */
        function getFilteredData() {
            const searchValue = document.getElementById('searchInput').value.toLowerCase();
            const monthValue = document.getElementById('monthFilter').value;
            const sortValue = document.getElementById('hoursSort').value;

            let filtered = workHoursData.filter(item => {
                const matchSearch = item.name.toLowerCase().includes(searchValue) ||
                                   item.id.toLowerCase().includes(searchValue);
                const matchMonth = monthValue === '' || item.month === monthValue;
                return matchSearch && matchMonth;
            });

            // 排序
            if (sortValue === 'desc') {
                filtered.sort((a, b) => b.hours - a.hours);
            } else if (sortValue === 'asc') {
                filtered.sort((a, b) => a.hours - b.hours);
            }

            return filtered;
        }

        /**
         * 筛选表格数据
         */
        function filterTable() {
            currentPage = 1;
            updateStats();
            renderTable();
        }

        /**
         * 排序表格数据
         * @param {number} columnIndex - 列索引
         */
        function sortTable(columnIndex) {
            const keys = ['name', 'id', 'hours'];
            const key = keys[columnIndex];

            workHoursData.sort((a, b) => {
                if (typeof a[key] === 'string') {
                    return a[key].localeCompare(b[key]);
                }
                return a[key] - b[key];
            });

            renderTable();
        }

        /**
         * 渲染分页控件
         * @param {number} totalItems - 总数据条数
         */
        function renderPagination(totalItems) {
            const totalPages = Math.ceil(totalItems / itemsPerPage);
            const pagination = document.getElementById('pagination');

            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }

            let html = '';
            html += `<button ${currentPage === 1 ? 'disabled' : ''} onclick="changePage(${currentPage - 1})">上一页</button>`;

            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    html += `<button class="${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += '<span style="padding: 10px;">...</span>';
                }
            }

            html += `<button ${currentPage === totalPages ? 'disabled' : ''} onclick="changePage(${currentPage + 1})">下一页</button>`;

            pagination.innerHTML = html;
        }

        /**
         * 切换分页
         * @param {number} page - 目标页码
         */
        function changePage(page) {
            const totalPages = Math.ceil(getFilteredData().length / itemsPerPage);
            if (page >= 1 && page <= totalPages) {
                currentPage = page;
                renderTable();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        /**
         * 查看工时详情
         * @param {number} index - 数据索引
         */
        function viewWorkHourDetail(index) {
            const filteredData = getFilteredData();
            const actualIndex = workHoursData.indexOf(filteredData[index]);
            const item = workHoursData[actualIndex];
            alert(`工时详情：\n\n姓名：${item.name}\n员工ID：${item.id}\n已有工时：${item.hours}小时\n月份：${item.month}\n\n（实际项目中应跳转到详情页面或打开模态框）`);
        }
    </script>
</body>
</html>
