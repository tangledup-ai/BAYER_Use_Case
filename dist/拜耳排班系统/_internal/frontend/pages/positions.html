<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>岗位工作 - 拜耳制药排班系统</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
        <!-- 头部导航 -->
        <header class="header">
            <h1>🏥 拜耳制药排班系统 - 数据分析平台</h1>
            <nav class="nav-menu">
                <a href="../index.html" class="nav-item">📊 数据总览</a>
                <a href="leaves.html" class="nav-item">📋 请假表</a>
                <a href="workhours.html" class="nav-item">⏰ 工时数据</a>
                <a href="shifts.html" class="nav-item">🗂️ 班次数据</a>
                <a href="positions.html" class="nav-item active">💼 岗位工作</a>
            </nav>
        </header>

        <!-- 主内容区域 -->
        <main class="main-content">
            <h2 class="page-title">岗位工作次数</h2>

            <!-- 筛选和搜索区域 -->
            <div class="filter-section">
                <input type="text" class="search-input" placeholder="🔍 搜索岗位ID..." id="searchInput" onkeyup="filterTable()">
                <select class="filter-select" id="ratioSort" onchange="filterTable()">
                    <option value="">默认排序</option>
                    <option value="desc">期望占比从高到低</option>
                    <option value="asc">期望占比从低到高</option>
                </select>
                <select class="filter-select" id="monthFilter" onchange="filterTable()">
                    <option value="">全部月份</option>
                    <option value="2026-04">2026年4月</option>
                    <option value="2026-03">2026年3月</option>
                    <option value="2026-02">2026年2月</option>
                </select>
            </div>

            <!-- 岗位工作统计卡片 -->
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>岗位总数</h3>
                    <div class="stat-value" id="totalPositions">-</div>
                    <div class="stat-label">个</div>
                </div>
                <div class="stat-card">
                    <h3>本月总班次</h3>
                    <div class="stat-value" id="totalShifts">-</div>
                    <div class="stat-label">次</div>
                </div>
                <div class="stat-card">
                    <h3>平均期望占比</h3>
                    <div class="stat-value" id="avgExpectedRatio">-</div>
                    <div class="stat-label">%</div>
                </div>
                <div class="stat-card">
                    <h3>分配均衡度</h3>
                    <div class="stat-value" id="balanceScore">-</div>
                    <div class="stat-label">分</div>
                </div>
            </div>

            <!-- 岗位工作数据表格 -->
            <table class="data-table" id="positionsTable">
                <thead>
                    <tr>
                        <th onclick="sortTable(0)" class="tooltip" data-tooltip="点击排序">岗位ID ↕</th>
                        <th onclick="sortTable(1)" class="tooltip" data-tooltip="点击排序">个人班次 ↕</th>
                        <th onclick="sortTable(2)" class="tooltip" data-tooltip="点击排序">岗位班次 ↕</th>
                        <th onclick="sortTable(3)" class="tooltip" data-tooltip="点击排序">期望工作占比 ↕</th>
                        <th>占比可视化</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="positionsTableBody">
                    <tr>
                        <td colspan="6" class="loading">
                            <div class="spinner"></div>
                            加载中...
                        </td>
                    </tr>
                </tbody>
            </table>

            <!-- 分页控制 -->
            <div class="pagination" id="pagination"></div>
        </main>
    </div>

    <script src="../js/main.js"></script>
    <script>
        /**
         * 岗位工作次数管理脚本
         * 处理岗位工作数据的显示、筛选、排序和统计功能
         */

        let positionsData = [];
        let currentPage = 1;
        const itemsPerPage = 10;

        /**
         * 页面加载完成后初始化岗位工作数据
         */
        document.addEventListener('DOMContentLoaded', function() {
            loadPositionsData();
        });

        /**
         * 从后端API加载岗位工作数据
         */
        function loadPositionsData() {
            // 模拟从后端API获取数据
            fetch('/api/positions')
                .then(response => response.json())
                .then(data => {
                    positionsData = data;
                    updateStats();
                    renderTable();
                })
                .catch(error => {
                    console.error('加载岗位工作数据失败:', error);
                    // 使用示例数据
                    loadSamplePositionsData();
                });
        }

        /**
         * 加载示例岗位工作数据用于演示
         */
        function loadSamplePositionsData() {
            positionsData = [
                { positionId: 'P001', personalShifts: 20, positionShifts: 45, expectedRatio: 44.4, month: '2026-04' },
                { positionId: 'P002', personalShifts: 15, positionShifts: 30, expectedRatio: 50, month: '2026-04' },
                { positionId: 'P003', personalShifts: 18, positionShifts: 40, expectedRatio: 45, month: '2026-04' },
                { positionId: 'P004', personalShifts: 12, positionShifts: 25, expectedRatio: 48, month: '2026-04' },
                { positionId: 'P005', personalShifts: 22, positionShifts: 50, expectedRatio: 44, month: '2026-04' },
                { positionId: 'P006', personalShifts: 16, positionShifts: 35, expectedRatio: 45.7, month: '2026-04' },
                { positionId: 'P007', personalShifts: 19, positionShifts: 42, expectedRatio: 45.2, month: '2026-04' },
                { positionId: 'P008', personalShifts: 14, positionShifts: 28, expectedRatio: 50, month: '2026-04' },
                { positionId: 'P009', personalShifts: 21, positionShifts: 48, expectedRatio: 43.8, month: '2026-04' },
                { positionId: 'P010', personalShifts: 17, positionShifts: 38, expectedRatio: 44.7, month: '2026-04' },
                { positionId: 'P011', personalShifts: 13, positionShifts: 26, expectedRatio: 50, month: '2026-04' },
                { positionId: 'P012', personalShifts: 23, positionShifts: 52, expectedRatio: 44.2, month: '2026-04' },
                { positionId: 'P013', personalShifts: 15, positionShifts: 32, expectedRatio: 46.9, month: '2026-03' },
                { positionId: 'P014', personalShifts: 18, positionShifts: 36, expectedRatio: 50, month: '2026-03' },
                { positionId: 'P015', personalShifts: 20, positionShifts: 44, expectedRatio: 45.5, month: '2026-02' }
            ];
            updateStats();
            renderTable();
        }

        /**
         * 更新岗位工作统计数据
         */
        function updateStats() {
            const filteredData = getFilteredData();
            const totalPositions = filteredData.length;
            const totalShifts = filteredData.reduce((sum, item) => sum + item.positionShifts, 0);
            const avgExpectedRatio = filteredData.length > 0
                ? (filteredData.reduce((sum, item) => sum + item.expectedRatio, 0) / filteredData.length).toFixed(1)
                : 0;

            // 计算分配均衡度（基于期望占比的方差，方差越小越均衡）
            const variance = calculateVariance(filteredData.map(item => item.expectedRatio));
            const balanceScore = Math.max(0, (100 - variance).toFixed(1));

            document.getElementById('totalPositions').textContent = totalPositions;
            document.getElementById('totalShifts').textContent = totalShifts;
            document.getElementById('avgExpectedRatio').textContent = avgExpectedRatio;
            document.getElementById('balanceScore').textContent = balanceScore;
        }

        /**
         * 计算数组的方差
         * @param {Array} arr - 数值数组
         * @returns {number} 方差值
         */
        function calculateVariance(arr) {
            if (arr.length === 0) return 0;
            const mean = arr.reduce((sum, val) => sum + val, 0) / arr.length;
            const squaredDiffs = arr.map(val => Math.pow(val - mean, 2));
            return Math.sqrt(squaredDiffs.reduce((sum, val) => sum + val, 0) / arr.length);
        }

        /**
         * 渲染岗位工作表格
         */
        function renderTable() {
            const filteredData = getFilteredData();
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const pageData = filteredData.slice(startIndex, endIndex);
            const maxRatio = filteredData.length > 0 ? Math.max(...filteredData.map(item => item.expectedRatio)) : 1;

            const tbody = document.getElementById('positionsTableBody');

            if (pageData.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" style="text-align: center; padding: 40px; color: #999;">
                            暂无数据
                        </td>
                    </tr>
                `;
            } else {
                tbody.innerHTML = pageData.map((item, index) => {
                    const ratioPercentage = item.expectedRatio.toFixed(1);
                    const barWidth = (item.expectedRatio / maxRatio) * 100;
                    const isBalanced = Math.abs(item.expectedRatio - 45) < 5;

                    return `
                        <tr>
                            <td class="cell-id">${item.positionId}</td>
                            <td>${item.personalShifts}</td>
                            <td>${item.positionShifts}</td>
                            <td>
                                <span class="cell-percentage" style="${isBalanced ? 'background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);' : ''}">
                                    ${ratioPercentage}%
                                </span>
                            </td>
                            <td>
                                <div style="display: flex; align-items: center; gap: 10px;">
                                    <div class="progress-bar" style="flex: 1;">
                                        <div class="progress-bar-fill" style="width: ${barWidth}%; ${isBalanced ? 'background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);' : ''}"></div>
                                    </div>
                                    <span style="min-width: 50px; font-size: 12px; color: #666;">${ratioPercentage}%</span>
                                </div>
                            </td>
                            <td>
                                <button class="btn btn-secondary" style="padding: 6px 12px; font-size: 12px;"
                                        onclick="viewPositionDetail(${startIndex + index})">
                                    详情
                                </button>
                            </td>
                        </tr>
                    `;
                }).join('');
            }

            renderPagination(filteredData.length);
        }

        /**
         * 获取筛选后的数据
         * @returns {Array} 筛选后的数据
         */
        function getFilteredData() {
            const searchValue = document.getElementById('searchInput').value.toLowerCase();
            const monthValue = document.getElementById('monthFilter').value;
            const sortValue = document.getElementById('ratioSort').value;

            let filtered = positionsData.filter(item => {
                const matchSearch = item.positionId.toLowerCase().includes(searchValue);
                const matchMonth = monthValue === '' || item.month === monthValue;
                return matchSearch && matchMonth;
            });

            // 排序
            if (sortValue === 'desc') {
                filtered.sort((a, b) => b.expectedRatio - a.expectedRatio);
            } else if (sortValue === 'asc') {
                filtered.sort((a, b) => a.expectedRatio - b.expectedRatio);
            }

            return filtered;
        }

        /**
         * 筛选表格数据
         */
        function filterTable() {
            currentPage = 1;
            updateStats();
            renderTable();
        }

        /**
         * 排序表格数据
         * @param {number} columnIndex - 列索引
         */
        function sortTable(columnIndex) {
            const keys = ['positionId', 'personalShifts', 'positionShifts', 'expectedRatio'];
            const key = keys[columnIndex];

            positionsData.sort((a, b) => {
                if (typeof a[key] === 'string') {
                    return a[key].localeCompare(b[key]);
                }
                return a[key] - b[key];
            });

            renderTable();
        }

        /**
         * 渲染分页控件
         * @param {number} totalItems - 总数据条数
         */
        function renderPagination(totalItems) {
            const totalPages = Math.ceil(totalItems / itemsPerPage);
            const pagination = document.getElementById('pagination');

            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }

            let html = '';
            html += `<button ${currentPage === 1 ? 'disabled' : ''} onclick="changePage(${currentPage - 1})">上一页</button>`;

            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    html += `<button class="${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    html += '<span style="padding: 10px;">...</span>';
                }
            }

            html += `<button ${currentPage === totalPages ? 'disabled' : ''} onclick="changePage(${currentPage + 1})">下一页</button>`;

            pagination.innerHTML = html;
        }

        /**
         * 切换分页
         * @param {number} page - 目标页码
         */
        function changePage(page) {
            const totalPages = Math.ceil(getFilteredData().length / itemsPerPage);
            if (page >= 1 && page <= totalPages) {
                currentPage = page;
                renderTable();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        /**
         * 查看岗位工作详情
         * @param {number} index - 数据索引
         */
        function viewPositionDetail(index) {
            const filteredData = getFilteredData();
            const actualIndex = positionsData.indexOf(filteredData[index]);
            const item = positionsData[actualIndex];
            alert(`岗位工作详情：\n\n岗位ID：${item.positionId}\n个人班次：${item.personalShifts}\n岗位班次：${item.positionShifts}\n期望工作占比：${item.expectedRatio.toFixed(1)}%\n月份：${item.month}\n\n（实际项目中应跳转到详情页面或打开模态框）`);
        }
    </script>
</body>
</html>
